<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neural Topology Grid HUD</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4e225",
                        "accent-purple": "#a855f7",
                        "accent-cyan": "#06b6d4",
                        "background-light": "#f8f8f5",
                        "background-dark": "#0a0a05",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .grid-lines {
            background-image: linear-gradient(to right, rgba(244, 226, 37, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(244, 226, 37, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        .chromatic-glow {
            text-shadow: 2px 0 #a855f7, -2px 0 #06b6d4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden select-none">
<!-- HUD Container -->
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Scanning Overlay -->
<div class="absolute inset-0 scanline opacity-20 z-50"></div>
<div class="absolute inset-0 grid-lines z-0"></div>
<!-- Top Header HUD -->
<div class="relative z-10 flex items-center justify-between p-4 pt-12 border-b border-primary/20 bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center gap-3">
<div class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30">
<span class="material-symbols-outlined text-primary text-2xl">hub</span>
</div>
<div>
<h1 class="text-xs font-bold tracking-widest text-primary/60 uppercase">System Status</h1>
<h2 class="text-lg font-bold leading-none tracking-tight italic chromatic-glow">NEURAL_TOPOLOGY_v2.0</h2>
</div>
</div>
<div class="flex gap-2">
<button class="flex size-10 items-center justify-center rounded-full bg-primary/10 border border-primary/20 text-primary">
<span class="material-symbols-outlined">analytics</span>
</button>
<button class="flex size-10 items-center justify-center rounded-full bg-primary/10 border border-primary/20 text-primary">
<span class="material-symbols-outlined">notifications_active</span>
</button>
</div>
</div>
<!-- Main 3D Perspective Viewport -->
<div class="relative flex-1 overflow-hidden">
<!-- Background Image: Neural Mesh -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Deep perspective 3D neon mesh network in a black void" style="background-image: radial-gradient(circle at center, transparent 0%, #0a0a05 90%), url('https://lh3.googleusercontent.com/aida-public/AB6AXuB4DcBgeGZVgGPQWWTGRmvE6qdmaE_5RmkEz_D25EeOxzc3jeS_Ig3NLVGMvKXjEkCiwOt7qfz5Hy0YiPLHbpkTVKrAZ-MZ_Os2sINmyn74K0q2QUCY_gF9dVKnZx_qc8gXhchtSCSAFrK9RAU-ez656SXzfIRkUI0F39BW90LullhVIEa6M-KHLGykXt1pDdpRs90llvvzOdzQKFXrkeMGzw8XK2DwQ_CJRbzP2JzAwz9-AiuwciiiBPsHaOVA1nHiv2hksoBZhyQ');">
</div>
<!-- Floating 3D HUD Elements -->
<div class="absolute inset-0 flex flex-col justify-between p-6 z-10">
<!-- Performance Metrics -->
<div class="flex flex-wrap gap-4">
<div class="flex flex-1 flex-col gap-1 rounded-xl p-4 bg-background-dark/60 border-l-4 border-primary backdrop-blur-sm">
<p class="text-primary/70 text-[10px] font-bold tracking-[0.2em] uppercase italic">NODE_LATENCY</p>
<div class="flex items-end gap-2">
<p class="text-2xl font-bold tracking-tighter text-slate-100">1.2ms</p>
<span class="text-red-500 text-xs font-bold mb-1">-0.2</span>
</div>
</div>
<div class="flex flex-1 flex-col gap-1 rounded-xl p-4 bg-background-dark/60 border-l-4 border-accent-cyan backdrop-blur-sm">
<p class="text-accent-cyan/70 text-[10px] font-bold tracking-[0.2em] uppercase italic">SIGNAL_FLUX</p>
<div class="flex items-end gap-2">
<p class="text-2xl font-bold tracking-tighter text-slate-100">98.4%</p>
<span class="text-green-500 text-xs font-bold mb-1">+4.1</span>
</div>
</div>
</div>
<!-- Navigation HUD Controls -->
<div class="flex justify-between items-end">
<div class="flex flex-col gap-4">
<div class="flex flex-col bg-background-dark/80 rounded-full border border-primary/20 overflow-hidden backdrop-blur-md">
<button class="p-3 hover:bg-primary/20 text-primary border-b border-primary/10 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="p-3 hover:bg-primary/20 text-primary transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<button class="flex size-12 items-center justify-center rounded-full bg-primary text-background-dark shadow-[0_0_20px_rgba(244,226,37,0.5)]">
<span class="material-symbols-outlined">near_me</span>
</button>
</div>
<!-- Search Node Core -->
<div class="flex-1 max-w-[200px] ml-4">
<div class="relative h-12">
<div class="absolute inset-0 bg-primary/10 rounded-xl skew-x-[-12deg] border border-primary/30"></div>
<div class="relative flex items-center h-full px-4">
<span class="material-symbols-outlined text-primary/60 mr-2 text-xl">search</span>
<input class="bg-transparent border-none p-0 text-sm font-bold tracking-wider text-primary focus:ring-0 placeholder:text-primary/30 w-full" placeholder="SCAN_NODE"/>
</div>
</div>
</div>
</div>
</div>
<!-- Pulsing Data Hub Detail -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 pointer-events-none">
<div class="absolute inset-0 border-2 border-primary/20 rounded-full animate-pulse"></div>
<div class="absolute inset-4 border border-accent-purple/40 rounded-full"></div>
<div class="absolute inset-10 bg-primary/10 rounded-full flex items-center justify-center backdrop-blur-sm border border-primary/50">
<span class="material-symbols-outlined text-primary text-4xl animate-bounce">adjust</span>
</div>
</div>
</div>
<!-- Major Hub Card -->
<div class="relative z-20 p-4">
<div class="bg-cover bg-center rounded-xl overflow-hidden border border-primary/30 shadow-[0_0_30px_rgba(0,0,0,0.5)]" data-alt="Digital representation of a major planetary network hub" style="background-image: linear-gradient(to top, #0a0a05, transparent), url('https://lh3.googleusercontent.com/aida-public/AB6AXuBWlCN0L-PK3Y4KzZx-uU2Eel3CW5os04wZ7TuM617GlSDOq-Kjf-FVR-QPPebeXCJP7nCQjlLBrpxSyO26Heu7iyvAEYai14tLfAQk-oozTinB4j-TjO8Ynb8DPmgfv8Hgwcy5duYqrz5rFTahxEMmaZyunw3Hmu1V9eFvcNUTs6iDrLevseGK9brWOLEUo8s3TxMrKkXoyUpLvmxFGThZX1Xf4b8Mr8_skE1suPeRbTvWD_8eFShV-mrZ3qw6gsooBkzwmWndY90');">
<div class="p-6 pt-16 flex items-end justify-between">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="size-2 rounded-full bg-primary animate-ping"></span>
<p class="text-[10px] font-bold text-primary tracking-widest uppercase">Active Linkage</p>
</div>
<h3 class="text-2xl font-bold italic tracking-tighter text-slate-100 italic chromatic-glow">PHOTON-CORE_ALPHA</h3>
<p class="text-xs font-medium text-slate-400">STATUS: PULSING_NEON_YELLOW</p>
</div>
<button class="px-6 py-2 bg-primary text-background-dark font-black text-[10px] tracking-widest uppercase rounded-full shadow-[0_0_15px_rgba(244,226,37,0.4)]">
                        BRIDGE_DATA
                    </button>
</div>
</div>
</div>
<!-- Bottom HUD Navigation -->
<div class="relative z-30 flex justify-between items-center px-6 pb-8 pt-4 bg-background-dark/95 border-t border-primary/20">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1]">grid_view</span>
<span class="text-[9px] font-black uppercase tracking-tighter">Topology</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/40" href="#">
<span class="material-symbols-outlined">memory</span>
<span class="text-[9px] font-black uppercase tracking-tighter">Cores</span>
</a>
<div class="relative -top-6">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
<button class="relative size-14 bg-primary rounded-full flex items-center justify-center text-background-dark shadow-lg">
<span class="material-symbols-outlined text-3xl font-bold">rocket_launch</span>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-primary/40" href="#">
<span class="material-symbols-outlined">share_reviews</span>
<span class="text-[9px] font-black uppercase tracking-tighter">Arteries</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/40" href="#">
<span class="material-symbols-outlined">settings_input_component</span>
<span class="text-[9px] font-black uppercase tracking-tighter">Config</span>
</a>
</div>
</div>
</body></html>
